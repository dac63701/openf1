name: Weekly OpenF1 Update & Docker Publish

# Run every week at 2am UTC on Monday
on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch: # allows manual trigger

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      # 1️⃣ Checkout your fork
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Add upstream and fetch latest
      - name: Add upstream
        run: git remote add upstream https://github.com/br-g/openf1.git

      - name: Fetch upstream
        run: |
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main

      # 3️⃣ Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4️⃣ Build & push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/openf1:latest
